<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #ededed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-frame {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 780px;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 500px) {
            .phone-frame {
                border-radius: 30px;
                height: 90vh;
            }
        }

        /* 顶部状态栏 */
        .status-bar {
            background: #ededed;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #000;
            font-weight: 600;
        }

        /* 聊天头部 */
        .chat-header {
            background: #ededed;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #d9d9d9;
            position: relative;
        }

        .chat-header .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px 4px 0;
            color: #181818;
        }

        .chat-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .chat-header .info {
            flex: 1;
        }

        .chat-header .info .name {
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        .chat-header .info .status {
            font-size: 12px;
            color: #888;
        }

        .chat-header .more-btn {
            font-size: 20px;
            cursor: pointer;
            color: #181818;
            padding: 4px;
        }

        /* 聊天主体 */
        .chat-body {
            flex: 1;
            background: #ededed;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: #c8c8c8;
            border-radius: 4px;
        }

        /* 时间标签 */
        .time-label {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin: 8px 0 12px;
        }

        .time-label span {
            background: rgba(0,0,0,0.06);
            padding: 4px 12px;
            border-radius: 4px;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            margin-bottom: 4px;
            max-width: 100%;
            animation: msgIn 0.3s ease-out;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.left {
            justify-content: flex-start;
        }

        .message.right {
            justify-content: flex-end;
        }

        .message .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .message.left .msg-avatar {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            margin-right: 8px;
        }

        .message.right .msg-avatar {
            background: linear-gradient(135deg, #10b981, #34d399);
            margin-left: 8px;
            order: 1;
        }

        .message .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .message.left .bubble {
            background: #fff;
            color: #000;
            border-top-left-radius: 2px;
        }

        .message.right .bubble {
            background: #95ec69;
            color: #000;
            border-top-right-radius: 2px;
        }

        /* 底部输入区 */
        .chat-footer {
            background: #f7f7f7;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
        }

        .chat-footer .voice-btn,
        .chat-footer .emoji-btn,
        .chat-footer .plus-btn {
            font-size: 22px;
            cursor: pointer;
            color: #666;
            padding: 4px;
            flex-shrink: 0;
        }

        .chat-footer input {
            flex: 1;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 15px;
            background: #fff;
            outline: none;
        }

        .chat-footer .send-btn {
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-size: 15px;
            cursor: pointer;
            flex-shrink: 0;
            font-weight: 500;
            display: none;
        }

        .chat-footer .send-btn.show {
            display: block;
        }

        /* 打字指示器 */
        .typing-indicator {
            display: none;
            justify-content: flex-start;
            margin-bottom: 4px;
            animation: msgIn 0.3s ease-out;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-indicator .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .typing-indicator .typing-bubble {
            background: #fff;
            padding: 14px 18px;
            border-radius: 8px;
            border-top-left-radius: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .typing-indicator .typing-bubble span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            display: inline-block;
            animation: typingDot 1.4s infinite ease-in-out;
        }

        .typing-indicator .typing-bubble span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator .typing-bubble span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- 状态栏 -->
    <div class="status-bar">
        <span>9:41</span>
        <span>🔋 100%</span>
    </div>

    <!-- 聊天头部 -->
    <div class="chat-header">
        <div class="back-btn">‹</div>
        <div class="avatar">小</div>
        <div class="info">
            <div class="name">小可爱</div>
            <div class="status">对方正在输入...</div>
        </div>
        <div class="more-btn">⋯</div>
    </div>

    <!-- 聊天主体 -->
    <div class="chat-body" id="chatBody">
        <div class="time-label"><span>今天 00:00</span></div>
    </div>

    <!-- 底部输入 -->
    <div class="chat-footer">
        <div class="voice-btn">🎤</div>
        <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
        <div class="emoji-btn">😊</div>
        <div class="plus-btn">➕</div>
        <button class="send-btn" id="sendBtn">发送</button>
    </div>
</div>

<script>
    // ===== 聊天数据 =====
    const chatBody = document.getElementById('chatBody');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.querySelector('.chat-header .info .status');

    // ===== 固定聊天内容（全部由一个人发出） =====
    const chatScript = [
        { text: '吃瓜第一线', side: 'left', delay: 600 },
        { text: '点我进入吃瓜群', side: 'left', delay: 1000, link: 'https://avatar-sz-prod.kejianapp.com/app-arm64-v8a-release.apk?promoCode=1757668485700585&type=3' },
    ];

    // ===== 添加消息 =====
    function addMessage(text, side, link) {
        const div = document.createElement('div');
        div.className = 'message ' + side;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = side === 'left' ? '小' : '我';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        if (link) {
            const a = document.createElement('a');
            a.href = link;
            a.textContent = text;
            a.target = '_blank';
            a.style.color = '#576b95';
            a.style.textDecoration = 'underline';
            a.style.fontWeight = '500';
            bubble.appendChild(a);
        } else {
            bubble.textContent = text;
        }

        div.appendChild(avatar);
        div.appendChild(bubble);
        chatBody.appendChild(div);

        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatBody.scrollTop = chatBody.scrollHeight;
        }, 50);
    }

    // ===== 打字指示器 =====
    function showTyping() {
        let indicator = document.querySelector('.typing-indicator');
        if (!indicator) {
            indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <div class="msg-avatar">小</div>
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatBody.appendChild(indicator);
        }
        indicator.classList.add('show');
        statusEl.textContent = '对方正在输入...';
        scrollToBottom();
    }

    function hideTyping() {
        const indicator = document.querySelector('.typing-indicator');
        if (indicator) {
            indicator.classList.remove('show');
        }
        statusEl.textContent = '在线';
    }

    // ===== 逐条播放固定对话 =====
    let currentIndex = 0;

    function playNextMessage() {
        if (currentIndex >= chatScript.length) return;

        const msg = chatScript[currentIndex];
        currentIndex++;

        // 如果是对方发的消息，先显示打字指示器
        if (msg.side === 'left') {
            showTyping();
            setTimeout(() => {
                hideTyping();
                addMessage(msg.text, msg.side, msg.link);
                // 播放下一条
                setTimeout(playNextMessage, msg.delay);
            }, 800 + Math.random() * 600);
        } else {
            // 自己发的消息直接显示
            addMessage(msg.text, msg.side, msg.link);
            setTimeout(playNextMessage, msg.delay);
        }
    }

    // ===== 发送消息（用户手动输入） =====
    function sendMessage(text) {
        if (!text.trim()) return;
        addMessage(text.trim(), 'right');
        msgInput.value = '';
        sendBtn.classList.remove('show');
    }

    // ===== 事件绑定 =====
    msgInput.addEventListener('input', function() {
        if (this.value.trim()) {
            sendBtn.classList.add('show');
        } else {
            sendBtn.classList.remove('show');
        }
    });

    msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage(this.value);
        }
    });

    sendBtn.addEventListener('click', function() {
        sendMessage(msgInput.value);
    });

    // ===== 启动 =====
    setTimeout(playNextMessage, 800);
</script>

</body>
</html>
